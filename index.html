<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Power - All-in-One Travel</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'nat-green': '#2d6a4f', 'nat-light': '#f0f4f1', 'nat-accent': '#d8573b', 'nat-dark': '#1b4332' },
                    fontFamily: { 'thai': ['Noto Sans Thai', 'sans-serif'], 'sans': ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #f7f9fc; overflow-y: auto; }
        .tab-content { display: none; }
        .active { display: block; }
        .nav-btn.active-btn { border-bottom: 3px solid #2d6a4f; color: #2d6a4f; }
        input:focus { outline: none; border: 2px solid #2d6a4f !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #loginOverlay { display: none; }
        .restaurant-card { transition: transform 0.2s; }
        .restaurant-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="max-w-md mx-auto shadow-2xl min-h-screen pb-24 relative bg-white">

    <div id="loginOverlay" class="fixed inset-0 bg-nat-dark/95 z-[100] flex flex-col justify-center p-8 text-white">
        <div class="flex justify-end"><button onclick="toggleLogin()" class="text-2xl">×</button></div>
        <h1 class="text-4xl font-black mb-2 font-sans">Nature Power</h1>
        <div class="space-y-4 text-gray-900 mt-8">
            <input type="text" placeholder="Username" class="w-full p-4 rounded-xl">
            <input type="password" placeholder="Password" class="w-full p-4 rounded-xl">
            <button class="w-full bg-nat-accent text-white font-black py-4 rounded-xl shadow-lg">Sign In</button>
        </div>
    </div>

    <div class="h-56 bg-cover bg-center relative" style="background-image: url('https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0?q=80&w=800&auto=format&fit=crop');">
        <div class="absolute inset-0 bg-black/30 p-6 flex flex-col justify-between text-white">
            <div class="flex justify-between items-center">
                <span id="headerRate" class="text-[10px] font-bold font-sans tracking-widest uppercase bg-black/20 px-3 py-1 rounded-full">Rate: Loading...</span>
                <button onclick="toggleLogin()" class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center"><i class="fa-solid fa-user"></i></button>
            </div>
            <div>
                <h1 class="text-3xl font-extrabold font-sans uppercase tracking-tighter">Nature Power</h1>
                <p class="text-sm opacity-90">Personal Travel Companion</p>
            </div>
        </div>
    </div>

    <nav class="flex overflow-x-auto whitespace-nowrap p-3 border-b border-gray-100 bg-white sticky top-0 z-50 no-scrollbar">
        <button onclick="openTab('budget')" class="nav-btn active-btn px-4 py-2 text-xs font-bold shrink-0">แลกเงิน</button>
        <button onclick="openTab('dining')" class="nav-btn px-4 py-2 text-xs font-bold shrink-0">ร้านอาหาร & บาร์</button>
        <button onclick="openTab('booking')" class="nav-btn px-4 py-2 text-xs font-bold shrink-0">Booking & SIM</button>
        <button onclick="openTab('checking')" class="nav-btn px-4 py-2 text-xs font-bold shrink-0">แผนการเดินทาง</button>
        <button onclick="openTab('safe')" class="nav-btn px-4 py-2 text-xs font-bold shrink-0">ช่วยเหลือ</button>
    </nav>

    <main class="p-5">
        
        <div id="budget" class="tab-content active">
            <div class="bg-nat-light p-6 rounded-3xl shadow-inner text-center">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-extrabold text-nat-dark">Currency Converter</h2>
                    <button onclick="swapCurrency()" class="bg-white w-10 h-10 rounded-full shadow-md text-nat-green flex items-center justify-center"><i class="fa-solid fa-arrows-rotate"></i></button>
                </div>
                <div class="space-y-4">
                    <input type="number" id="inputAmount" oninput="doConvert()" class="w-full p-5 bg-white rounded-2xl shadow-sm text-2xl font-black font-sans" placeholder="0.00">
                    <div class="py-10 bg-white rounded-3xl shadow-md border border-green-50">
                        <h3 id="outputAmount" class="text-5xl font-black text-nat-green font-sans">0</h3>
                        <p id="outputLabel" class="text-sm font-bold text-nat-accent font-sans mt-2 tracking-widest uppercase">JPY</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="dining" class="tab-content space-y-8">
            <h2 class="text-xl font-extrabold text-nat-dark">Restaurant & Bar Database</h2>
            
            <div id="restaurantContainer" class="space-y-8">
                </div>
        </div>

        <div id="booking" class="tab-content space-y-6">
            <h2 class="text-xl font-extrabold text-nat-dark">My Bookings</h2>
            <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                <div class="bg-green-50 p-4 rounded-xl text-nat-green"><i class="fa-solid fa-hotel text-xl"></i></div>
                <div class="flex-1 text-sm font-bold">ยังไม่มีข้อมูลการจอง</div>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-4">
                <div onclick="window.open('https://www.klook.com')" class="bg-white p-6 rounded-3xl text-center border border-gray-100 shadow-sm">
                    <i class="fa-solid fa-sim-card text-3xl mb-2 text-nat-accent"></i>
                    <p class="text-[10px] font-black uppercase">Sim Card</p>
                </div>
                <div onclick="window.open('https://www.agoda.com')" class="bg-white p-6 rounded-3xl text-center border border-gray-100 shadow-sm">
                    <i class="fa-solid fa-wifi text-3xl mb-2 text-nat-green"></i>
                    <p class="text-[10px] font-black uppercase">WiFi</p>
                </div>
            </div>
        </div>

        <div id="checking" class="tab-content space-y-6">
            <h2 class="text-xl font-extrabold text-nat-dark">Trip Planner</h2>
            <div class="bg-nat-light p-6 rounded-3xl space-y-4">
                <input type="text" id="tripPlace" class="w-full p-4 bg-white rounded-xl border-none" placeholder="Destination">
                <input type="time" id="tripTime" class="w-full p-4 bg-white rounded-xl border-none">
                <button onclick="addTrip()" class="w-full bg-nat-green text-white font-black py-4 rounded-xl shadow-md">Add to Plan</button>
            </div>
            <div id="tripList" class="space-y-3"></div>
        </div>

        <div id="safe" class="tab-content space-y-6 text-center">
             <div class="bg-red-50 p-10 rounded-[2.5rem] border border-red-100 space-y-4">
                <p class="text-4xl font-black text-gray-900 font-sans">たすけてください</p>
                <p class="text-xs text-gray-500 italic">Tasukete kudasai</p>
            </div>
            <a href="tel:110" class="flex items-center justify-center gap-3 w-full bg-nat-dark text-white font-bold py-5 rounded-2xl shadow-xl">
                <span>Call Police (Japan 110)</span>
            </a>
        </div>
    </main>

    <script>
        const restaurants = [
            { name: "Bar Benfiddich", type: "Bar", region: "ญี่ปุ่น — Tokyo 🇯🇵", address: "Shinjuku, Tokyo", vibe: "ไม่มีเมนู ผสมจากวัตถุดิบตามฤดูกาล บรรยากาศลึกลับส่วนตัว World's 50 Best #18", mbti: "INFJ, INTJ, ISFP", hd: "Reflector, Projector", price: "💰💰💰", img: "https://images.unsplash.com/photo-1579871494447-9811cf80d66c?q=80&w=600" },
            { name: "Virtù", type: "Bar", region: "ญี่ปุ่น — Tokyo 🇯🇵", address: "Otemachi, Tokyo", vibe: "วิวสกายไลน์ 360° ค็อกเทล French-Japanese luxury World's 50 Best #45", mbti: "ENFJ, ENTJ, ESFJ", hd: "Manifestor, Generator", price: "💰💰💰💰", img: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=600" },
            { name: "Golden Gai", type: "Bar", region: "ญี่ปุ่น — Tokyo 🇯🇵", address: "Shinjuku, Tokyo", vibe: "ตรอกซอย 70+ บาร์จิ๋วแต่ละที่มี theme ของตัวเอง", mbti: "ENFP, ENTP, ESTP", hd: "Generator, Manifesting Generator", price: "💰", img: "https://images.unsplash.com/photo-1582236209995-f1262d596489?q=80&w=600" },
            { name: "The SG Club", type: "Bar", region: "ญี่ปุ่น — Tokyo 🇯🇵", address: "Shibuya, Tokyo", vibe: "2 floors: ชั้นบน craft cocktail ชั้นล่าง dive bar World's 50 Best #65", mbti: "ENFP, ENTP, ESFP", hd: "Manifesting Generator, Generator", price: "💰💰💰", img: "https://images.unsplash.com/photo-1470337458703-46ad1756a187?q=80&w=600" },
            { name: "Florilège", type: "Restaurant", region: "ญี่ปุ่น — Tokyo 🇯🇵", address: "Minami-Aoyama, Tokyo", vibe: "Fine dining French-Japanese theatrical cooking World's 50 Best", mbti: "ENFJ, INTJ, INFJ", hd: "Projector, Manifestor", price: "💰💰💰💰", img: "https://images.unsplash.com/photo-1559339352-11d035aa65de?q=80&w=600" },
            { name: "Ichiran Ramen", type: "Restaurant", region: "ญี่ปุ่น — Tokyo 🇯🇵", address: "ทั่ว Tokyo", vibe: "กินคนเดียวในบูธส่วนตัว โฟกัส 100% ไม่ต้องพูดกับใคร", mbti: "INTJ, INTP, ISTJ, INFJ", hd: "Projector, Reflector", price: "💰", img: "https://images.unsplash.com/photo-1569718212165-3a8278d5f624?q=80&w=600" },
            { name: "Zest Seoul", type: "Bar", region: "เกาหลี 🇰🇷", address: "Seoul", vibe: "ใช้วัตถุดิบจากชาวนาและน้ำผึ้งจากผึ้งบนดาดฟ้าบาร์เอง World's 50 Best #16", mbti: "INFJ, ISFJ, ENFJ", hd: "Projector, Generator", price: "💰💰💰", img: "https://images.unsplash.com/photo-1510626176961-4b57d4fbad03?q=80&w=600" },
            { name: "Bar Leone", type: "Bar", region: "ฮ่องกง 🇭🇰", address: "Central, Hong Kong", vibe: "World's #1 Bar 2025 Italian-inspired cocktails for the people", mbti: "ESFP, ENFP, ESTP", hd: "Generator, Manifesting Generator", price: "💰💰💰", img: "https://images.unsplash.com/photo-1544145945-f904253d0c7b?q=80&w=600" }
            // Add other regions/restaurants here following the same structure
        ];

        function renderRestaurants() {
            const container = document.getElementById('restaurantContainer');
            // Grouping logic can be added here
            restaurants.forEach(res => {
                const html = `
                <div class="restaurant-card bg-white rounded-3xl shadow-md border border-gray-100 overflow-hidden">
                    <img src="${res.img}" class="h-44 w-full object-cover">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-lg font-bold text-nat-dark font-sans uppercase tracking-tighter">${res.name}</h3>
                            <span class="text-nat-green font-bold font-sans text-sm">${res.price}</span>
                        </div>
                        <p class="text-[10px] text-nat-accent font-bold uppercase mb-2 tracking-widest">${res.region}</p>
                        <p class="text-xs text-gray-500 mb-4 leading-relaxed">${res.address} | ${res.vibe}</p>
                        <div class="flex flex-wrap gap-2 mb-4">
                            <span class="text-[8px] bg-gray-100 px-2 py-1 rounded font-bold uppercase tracking-widest">${res.mbti}</span>
                            <span class="text-[8px] bg-indigo-50 text-indigo-600 px-2 py-1 rounded font-bold uppercase tracking-widest">${res.hd}</span>
                        </div>
                        <button onclick="window.open('https://www.google.com/maps/search/${res.name}+${res.address}')" class="w-full bg-nat-light text-nat-dark font-bold py-3 rounded-xl text-[10px] uppercase tracking-widest flex items-center justify-center gap-2">
                            <i class="fa-solid fa-location-dot"></i> Open Google Maps
                        </button>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        let currentRate = 0;
        let isThbToJpy = true;

        function toggleLogin() {
            const login = document.getElementById('loginOverlay');
            login.style.display = (login.style.display === 'flex') ? 'none' : 'flex';
        }

        async function fetchRate() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/THB');
                const data = await response.json();
                currentRate = data.rates.JPY;
                document.getElementById('headerRate').innerText = `Rate: 1 THB = ${currentRate.toFixed(2)} JPY`;
            } catch (e) { currentRate = 4.25; }
        }

        function swapCurrency() {
            isThbToJpy = !isThbToJpy;
            document.getElementById('outputLabel').innerText = isThbToJpy ? 'JPY' : 'THB';
            document.getElementById('inputAmount').value = '';
            document.getElementById('outputAmount').innerText = '0';
        }

        function doConvert() {
            const val = document.getElementById('inputAmount').value;
            if(!val) return document.getElementById('outputAmount').innerText = '0';
            const result = isThbToJpy ? (val * currentRate) : (val / currentRate);
            document.getElementById('outputAmount').innerText = parseInt(result).toLocaleString();
        }

        function openTab(tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let c of contents) { c.style.display = "none"; }
            document.getElementById(tabName).style.display = "block";
            const buttons = document.getElementsByClassName("nav-btn");
            for (let b of buttons) { b.classList.remove("active-btn"); }
            event.currentTarget.classList.add("active-btn");
            window.scrollTo(0, 0);
        }

        function addTrip() {
            const place = document.getElementById('tripPlace').value;
            const time = document.getElementById('tripTime').value;
            if(!place || !time) return;
            const item = `<div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex justify-between items-center animate-fade-in">
                <div><p class="font-bold text-nat-dark">${place}</p><p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">${time}</p></div>
                <i class="fa-solid fa-circle-check text-green-100 text-xl"></i>
            </div>`;
            document.getElementById('tripList').insertAdjacentHTML('afterbegin', item);
            document.getElementById('tripPlace').value = '';
        }

        fetchRate();
        renderRestaurants();
    </script>
</body>
</html>
