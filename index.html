<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe & Smart Travel Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fc; }
        .tab-content { display: none; }
        .active { display: block; }
        input:focus { outline: none; border-color: #d8573b !important; ring: 2px; ring-color: #d8573b; }
    </style>
</head>
<body class="max-w-md mx-auto shadow-xl min-h-screen pb-24 relative border border-green-50 rounded-2xl">

    <header class="bg-[#2c4e3a] text-white p-6 rounded-b-3xl text-center shadow-md relative overflow-hidden">
        <h1 class="text-3xl font-black tracking-tight" style="color: #d8573b; -webkit-text-stroke: 1px white;">Safe & Smart</h1>
        <p class="text-lg font-bold text-green-100">Travel Companion 🌏</p>
    </header>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white flex justify-around p-3 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] rounded-t-3xl border-t border-green-100 z-50">
        <button onclick="openTab('budget')" class="text-green-800 font-bold flex flex-col items-center"><i class="fa-solid fa-wallet text-xl" style="color: #d8573b;"></i><span class="text-[10px]">คุมงบ</span></button>
        <button onclick="openTab('flight')" class="text-green-800 font-bold flex flex-col items-center"><i class="fa-solid fa-plane-up text-xl" style="color: #d8573b;"></i><span class="text-[10px]">เที่ยวบิน</span></button>
        <button onclick="openTab('explore')" class="text-green-800 font-bold flex flex-col items-center"><i class="fa-solid fa-map-location-dot text-xl" style="color: #d8573b;"></i><span class="text-[10px]">ใกล้ฉัน</span></button>
        <button onclick="openTab('safe')" class="text-green-800 font-bold flex flex-col items-center"><i class="fa-solid fa-shield-halved text-xl" style="color: #d8573b;"></i><span class="text-[10px]">กู้ชีพ</span></button>
    </nav>

    <div id="budget" class="tab-content active p-6">
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-green-50 mb-4">
            <h2 class="text-xl font-black mb-4" style="color: #2c4e3a;">💰 คำนวณงบรายวัน</h2>
            <div class="space-y-4">
                <input type="number" id="totalBudget" class="w-full p-3.5 bg-green-50/50 rounded-xl border border-green-100" placeholder="งบทั้งหมด (บาท)">
                <input type="number" id="rate" step="0.01" class="w-full p-3.5 bg-green-50/50 rounded-xl border border-green-100" placeholder="เรทเงิน (เช่น 0.23)">
                <input type="number" id="days" class="w-full p-3.5 bg-green-50/50 rounded-xl border border-green-100" placeholder="จำนวนวัน">
                <button onclick="calcBudget()" class="w-full bg-[#d8573b] text-white font-black py-4 rounded-xl shadow-md">คำนวณเงิน</button>
            </div>
            <div id="result" class="mt-6 text-center hidden p-4 bg-green-50 rounded-2xl border border-green-100">
                <h3 id="dailyAmount" class="text-3xl font-black" style="color: #d8573b;"></h3>
                <p id="currencyResult" class="text-xs text-green-600 mt-1 font-bold"></p>
            </div>
        </div>
    </div>

    <div id="flight" class="tab-content p-6">
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-green-50">
            <h2 class="text-xl font-black mb-4" style="color: #2c4e3a;">✈️ เช็กสถานะเที่ยวบิน</h2>
            <p class="text-sm text-green-700 mb-4 font-semibold italic">* ใส่เลขเที่ยวบินเพื่อดูเวลาดีเลย์และประตูทางออก</p>
            <input type="text" id="flightNo" class="w-full p-3.5 bg-green-50/50 rounded-xl border border-green-100 mb-4 uppercase" placeholder="เช่น JL708 หรือ TG672">
            <button onclick="trackFlight()" class="w-full bg-[#2c4e3a] text-white font-black py-4 rounded-xl shadow-md">Track Flight</button>
        </div>
    </div>

    <div id="explore" class="tab-content p-6 text-center">
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-green-50">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-location-crosshairs text-3xl text-green-800"></i>
            </div>
            <h2 class="text-xl font-black mb-2" style="color: #2c4e3a;">ค้นหาที่เที่ยวใกล้ตัว</h2>
            <p class="text-sm text-slate-500 mb-6 font-medium">กดปุ่มด้านล่างเพื่อเปิดแผนที่ดูที่เที่ยว ร้านอาหาร และคาเฟ่ใกล้คุณที่สุด</p>
            <button onclick="findNearby('attractions')" class="w-full bg-[#d8573b] text-white font-black py-4 rounded-xl mb-3 shadow-md">🏛️ ที่เที่ยวใกล้ฉัน</button>
            <button onclick="findNearby('restaurants')" class="w-full bg-[#2c4e3a] text-white font-black py-4 rounded-xl shadow-md">🍜 ร้านอาหาร/คาเฟ่ใกล้ฉัน</button>
        </div>
    </div>

    <div id="safe" class="tab-content p-6 space-y-4">
        <h2 class="text-xl font-black text-slate-700">🆘 บัตรช่วยชีวิต</h2>
        <div class="bg-white p-5 rounded-2xl border-l-8 border-[#d8573b] shadow-sm">
            <p class="text-green-800 font-bold text-sm">แจ้งเหตุฉุกเฉิน</p>
            <p class="text-[#d8573b] text-2xl font-black mt-1">たすけてください</p>
        </div>
        <a href="tel:110" class="block w-full bg-red-600 text-white text-center font-black py-4 rounded-xl shadow-lg">📞 โทรแจ้งตำรวจ (110)</a>
    </div>

    <script>
        function openTab(tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let c of contents) { c.style.display = "none"; }
            document.getElementById(tabName).style.display = "block";
        }

        function calcBudget() {
            const total = document.getElementById('totalBudget').value;
            const rate = document.getElementById('rate').value;
            const days = document.getElementById('days').value;
            if(total && rate && days) {
                const dailyTHB = (total / days).toFixed(0);
                const dailyForeign = (dailyTHB / rate).toFixed(0);
                document.getElementById('dailyAmount').innerText = parseInt(dailyTHB).toLocaleString() + " THB";
                document.getElementById('currencyResult').innerText = "ประมาณ " + parseInt(dailyForeign).toLocaleString() + " สกุลเงินท้องถิ่น";
                document.getElementById('result').classList.remove('hidden');
            }
        }

        function trackFlight() {
            const flight = document.getElementById('flightNo').value;
            if(flight) {
                window.open(`https://www.google.com/search?q=flight+status+${flight}`, '_blank');
            } else { alert("กรุณาใส่เลขเที่ยวบินครับ"); }
        }

        function findNearby(type) {
            const query = type === 'attractions' ? 'tourist+attractions' : 'restaurants+and+cafes';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    window.open(`https://www.google.com/maps/search/${query}/@${lat},${lon},15z`, '_blank');
                }, () => {
                    window.open(`https://www.google.com/maps/search/${query}/`, '_blank');
                });
            } else {
                window.open(`https://www.google.com/maps/search/${query}/`, '_blank');
            }
        }
    </script>
</body>
</html>
