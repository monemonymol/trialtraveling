<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Power - All-in-One Travel</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'nat-green': '#2d6a4f', 'nat-light': '#f0f4f1', 'nat-accent': '#d8573b', 'nat-dark': '#1b4332' },
                    fontFamily: { 'thai': ['Noto Sans Thai', 'sans-serif'], 'sans': ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #f7f9fc; overflow-y: auto; }
        .tab-content { display: none; }
        .active { display: block; }
        .nav-btn.active-btn { border-bottom: 3px solid #2d6a4f; color: #2d6a4f; }
        input, select, textarea { border: 1px solid #e5e7eb !important; outline: none; }
        input:focus { border-color: #2d6a4f !important; ring: 2px; ring-color: #2d6a4f; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto shadow-2xl min-h-screen pb-24 relative bg-white">

    <div class="h-48 bg-cover bg-center relative" style="background-image: url('https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0?q=80&w=800&auto=format&fit=crop');">
        <div class="absolute inset-0 bg-black/30 p-6 flex flex-col justify-between text-white">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-bold uppercase tracking-widest bg-white/20 px-3 py-1 rounded-full">Explore Nature</span>
                <button onclick="openTab('safe')" class="w-8 h-8 bg-red-500/80 rounded-full flex items-center justify-center"><i class="fa-solid fa-heart-pulse text-xs"></i></button>
            </div>
            <div>
                <h1 class="text-3xl font-black font-sans uppercase tracking-tighter">Nature Power</h1>
                <p class="text-xs opacity-90">Personalize Your Journey</p>
            </div>
        </div>
    </div>

    <nav class="flex overflow-x-auto whitespace-nowrap p-3 border-b border-gray-100 bg-white sticky top-0 z-50 no-scrollbar">
        <button onclick="openTab('dining')" class="nav-btn active-btn px-4 py-2 text-xs font-bold shrink-0">บาร์ & ร้านอาหาร</button>
        <button onclick="openTab('budget')" class="nav-btn px-4 py-2 text-xs font-bold shrink-0">แลกเงิน</button>
        <button onclick="openTab('analytics')" class="nav-btn px-4 py-2 text-xs font-bold shrink-0">วิเคราะห์ค่าใช้จ่าย</button>
        <button onclick="openTab('checking')" class="nav-btn px-4 py-2 text-xs font-bold shrink-0">แผนการเดินทาง</button>
    </nav>

    <main class="p-5">
        
        <div id="dining" class="tab-content active space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-extrabold text-nat-dark uppercase">Recommended Bars</h2>
                <div class="flex gap-2">
                    <span class="bg-nat-light text-nat-green text-[10px] px-2 py-1 rounded font-bold">TOP 50 BARS</span>
                </div>
            </div>
            <div id="barContainer" class="space-y-6">
                </div>
        </div>

        <div id="budget" class="tab-content space-y-6">
            <div class="bg-nat-light p-6 rounded-3xl text-center">
                <h2 class="text-lg font-extrabold text-nat-dark mb-4">Currency Swap</h2>
                <div class="space-y-3">
                    <input type="number" id="inputAmount" oninput="doConvert()" class="w-full p-4 bg-white rounded-xl text-xl font-bold" placeholder="กรอกจำนวนเงิน">
                    <button onclick="swapCurrency()" class="text-nat-green font-bold text-xs underline">สลับหน่วย THB / JPY</button>
                    <div class="py-8 bg-white rounded-2xl shadow-sm border border-green-50 mt-4">
                        <h3 id="outputAmount" class="text-4xl font-black text-nat-green">0</h3>
                        <p id="outputLabel" class="text-xs font-bold text-nat-accent uppercase tracking-widest mt-1">JPY</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="analytics" class="tab-content space-y-6">
            <h2 class="text-xl font-extrabold text-nat-dark">AI Expense Tracker</h2>
            <div class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">ค่าตั๋วเครื่องบิน</label>
                        <input type="number" id="expFlight" class="w-full p-3 bg-gray-50 rounded-xl mt-1" placeholder="0.00">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">ค่าที่พัก</label>
                        <input type="number" id="expHotel" class="w-full p-3 bg-gray-50 rounded-xl mt-1" placeholder="0.00">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">ค่าอาหาร & บาร์</label>
                    <input type="number" id="expFood" class="w-full p-3 bg-gray-50 rounded-xl mt-1" placeholder="0.00">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">ค่าอื่นๆ (ช้อปปิ้ง/เดินทาง)</label>
                    <input type="number" id="expOther" class="w-full p-3 bg-gray-50 rounded-xl mt-1" placeholder="0.00">
                </div>
                <button onclick="analyzeExpenses()" class="w-full bg-nat-green text-white font-black py-4 rounded-xl shadow-lg">Analyze My Spending</button>
            </div>

            <div id="aiInsight" class="hidden bg-nat-dark text-white p-6 rounded-3xl space-y-4">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-robot text-nat-accent text-2xl"></i>
                    <p class="font-bold text-sm uppercase tracking-widest">AI Financial Insight</p>
                </div>
                <p id="insightText" class="text-xs leading-relaxed opacity-90"></p>
                <div class="pt-4 border-t border-white/10 flex justify-between items-center">
                    <div>
                        <p class="text-[9px] font-bold uppercase opacity-50">Gems Points Earned</p>
                        <p class="text-xl font-black text-amber-400">+500 Gems</p>
                    </div>
                    <i class="fa-solid fa-gem text-amber-400 text-3xl"></i>
                </div>
            </div>
        </div>

        <div id="checking" class="tab-content space-y-6">
            <h2 class="text-xl font-extrabold text-nat-dark uppercase">Trip Planner</h2>
            <div class="bg-nat-light p-5 rounded-3xl space-y-3">
                <input type="text" id="tripPlace" class="w-full p-4 bg-white rounded-xl border-none" placeholder="Destination">
                <input type="time" id="tripTime" class="w-full p-4 bg-white rounded-xl border-none">
                <button onclick="addTrip()" class="w-full bg-nat-green text-white font-black py-4 rounded-xl">Add to Plan</button>
            </div>
            <div id="tripList" class="space-y-3"></div>
        </div>

        <div id="safe" class="tab-content text-center py-10">
            <div class="bg-red-50 p-10 rounded-[3rem] border border-red-100 mb-6">
                <p class="text-4xl font-black text-gray-900">たすけてください</p>
                <p class="text-xs text-gray-500 italic mt-2">กรุณาช่วยฉันด้วย (Tasukete kudasai)</p>
            </div>
            <a href="tel:110" class="bg-nat-dark text-white font-black py-5 px-10 rounded-2xl shadow-xl inline-block">Call Police (Japan 110)</a>
        </div>

    </main>

    <script>
        const bars = [
            { name: "Bar Benfiddich", region: "Tokyo", vibe: "Farm-to-Glass, ลึกลับส่วนตัว", mbti: "INFJ, INTJ", price: "💰💰💰", img: "https://images.unsplash.com/photo-1579871494447-9811cf80d66c?q=80&w=600" },
            { name: "Virtù", region: "Tokyo", vibe: "หรูหรา สไตล์ปารีเซียง", mbti: "ENFJ, ENTJ", price: "💰💰💰💰", img: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=600" },
            { name: "The SG Club", region: "Shibuya", vibe: "บาร์ 2 สไตล์ในที่เดียว", mbti: "ENFP, ENTP", price: "💰💰💰", img: "https://images.unsplash.com/photo-1470337458703-46ad1756a187?q=80&w=600" },
            { name: "Golden Gai", region: "Shinjuku", vibe: "ตรอกบาร์จิ๋วสุดคลาสสิก", mbti: "ESTP, ESFP", price: "💰", img: "https://images.unsplash.com/photo-1582236209995-f1262d596489?q=80&w=600" },
            { name: "Bar Trench", region: "Ebisu", vibe: "เชี่ยวชาญด้าน Absinthe", mbti: "INTJ, INFP", price: "💰💰💰", img: "https://images.unsplash.com/photo-1551024709-8f23befc6f87?q=80&w=600" }
        ];

        function renderBars() {
            const container = document.getElementById('barContainer');
            bars.forEach(bar => {
                const html = `
                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                    <img src="${bar.img}" class="h-44 w-full object-cover">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="text-lg font-bold text-nat-dark uppercase tracking-tighter">${bar.name}</h3>
                            <span class="text-nat-green font-bold text-sm font-sans">${bar.price}</span>
                        </div>
                        <p class="text-[10px] text-nat-accent font-bold uppercase tracking-widest mb-3">${bar.region}</p>
                        <p class="text-xs text-gray-500 mb-4">${bar.vibe}</p>
                        <div class="flex justify-between items-center border-t border-gray-50 pt-4">
                            <span class="text-[9px] bg-nat-light text-nat-green px-2 py-1 rounded font-bold uppercase">${bar.mbti}</span>
                            <button onclick="window.open('https://www.google.com/maps/search/${bar.name}')" class="text-nat-dark font-bold text-[10px] underline uppercase tracking-widest">Open Map</button>
                        </div>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function analyzeExpenses() {
            const f = parseFloat(document.getElementById('expFlight').value) || 0;
            const h = parseFloat(document.getElementById('expHotel').value) || 0;
            const fo = parseFloat(document.getElementById('expFood').value) || 0;
            const o = parseFloat(document.getElementById('expOther').value) || 0;
            
            const total = f + h + fo + o;
            const foodPercent = ((fo / total) * 100).toFixed(0);
            
            let insight = "";
            if (foodPercent > 40) {
                insight = `คุณใช้เงินกับอาหารและบาร์ไปถึง ${foodPercent}% ของงบทั้งหมด! คุณคือ "Experience Seeker" ตัวจริง ทริปนี้เน้นความสุขทางรสชาติเป็นหลัก ซึ่งดีมากสำหรับ Mental Health ครับ`;
            } else if (f + h > total * 0.6) {
                insight = `ค่าใช้จ่ายส่วนใหญ่หนักไปที่ความสบาย (ที่พักและตั๋ว) ครั้งหน้าลองมองหาดีลพิเศษล่วงหน้าเพื่อเพิ่มงบช้อปปิ้งดูนะครับ`;
            } else {
                insight = `การบริหารจัดการเงินของคุณสมดุลมาก! คุณมี Financial Mindset ที่ยอดเยี่ยมในการเดินทาง`;
            }

            document.getElementById('insightText').innerText = insight;
            document.getElementById('aiInsight').classList.remove('hidden');
            window.scrollTo(0, document.body.scrollHeight);
        }

        // Core App Logic (Currency, Tabs, etc.)
        let currentRate = 0;
        let isThbToJpy = true;

        async function fetchRate() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/THB');
                const data = await response.json();
                currentRate = data.rates.JPY;
            } catch (e) { currentRate = 4.25; }
        }

        function doConvert() {
            const val = document.getElementById('inputAmount').value;
            if(!val) return document.getElementById('outputAmount').innerText = '0';
            const res = isThbToJpy ? (val * currentRate) : (val / currentRate);
            document.getElementById('outputAmount').innerText = parseInt(res).toLocaleString();
        }

        function swapCurrency() {
            isThbToJpy = !isThbToJpy;
            document.getElementById('outputLabel').innerText = isThbToJpy ? 'JPY' : 'THB';
            doConvert();
        }

        function openTab(tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let c of contents) { c.style.display = "none"; }
            document.getElementById(tabName).style.display = "block";
            const buttons = document.getElementsByClassName("nav-btn");
            for (let b of buttons) { b.classList.remove("active-btn"); }
            event.currentTarget.classList.add("active-btn");
        }

        fetchRate();
        renderBars();
    </script>
</body>
</html>
