<script>
        let allPlaces = [];
        let currentFilter = 'All';
        let expenses = [];

        // ฟังก์ชันดึงข้อมูลจาก GitHub
        async function loadData() {
            try {
                const response = await fetch('data.json'); // ดึงไฟล์ data.json ในโฟลเดอร์เดียวกัน
                if (!response.ok) throw new Error('Network response was not ok');
                allPlaces = await response.json();
                renderRestaurants(allPlaces); // แสดงผลครั้งแรก
            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('restaurantContainer').innerHTML = 
                    "<p class='text-center text-red-500 font-bold py-10'>ไม่สามารถโหลดข้อมูลได้ กรุณาตรวจสอบไฟล์ data.json</p>";
            }
        }

        // เรียกใช้งานทันทีเมื่อโหลดหน้าเว็บ
        loadData();

        function renderRestaurants(data) {
            const container = document.getElementById('restaurantContainer');
            container.innerHTML = "";
            
            data.forEach(res => {
                // เลือกสีธีมตาม Filter
                const themeClass = res.filter === 'Music Lover' ? 'border-music-theme' : (res.filter === 'Art Collector' ? 'border-art-theme' : 'border-gray-100');
                const themeTag = res.filter === 'Music Lover' ? 'bg-music-theme' : (res.filter === 'Art Collector' ? 'bg-art-theme' : 'bg-nat-green');

                container.innerHTML += `
                <div class="bg-white rounded-3xl shadow-sm border-l-4 ${themeClass} border-y border-r border-gray-50 overflow-hidden transition-all active:scale-95">
                    <img src="${res.img || 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=600'}" class="h-40 w-full object-cover shadow-inner">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="text-lg font-bold text-nat-dark uppercase font-sans tracking-tighter">${res.name}</h3>
                            <span class="text-nat-green font-bold text-xs">${res.price}</span>
                        </div>
                        <div class="flex items-center gap-2 mb-3">
                             <span class="${themeTag} text-white text-[8px] px-2 py-0.5 rounded-full font-black uppercase tracking-tighter">${res.filter}</span>
                             <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">${res.area} • ${res.type}</p>
                        </div>
                        <p class="text-xs text-gray-500 mb-4 leading-relaxed font-medium italic">"${res.vibe}"</p>
                        
                        <div class="flex justify-between items-center pt-4 border-t border-gray-50">
                            <div class="flex gap-1.5">
                                <div class="text-center">
                                    <p class="text-[7px] text-gray-400 font-bold uppercase">Energy</p>
                                    <span class="text-[8px] bg-nat-light text-nat-green px-2 py-1 rounded-lg font-bold uppercase">${res.energy}</span>
                                </div>
                                <div class="text-center">
                                    <p class="text-[7px] text-gray-400 font-bold uppercase">Human Design</p>
                                    <span class="text-[8px] bg-indigo-50 text-indigo-700 px-2 py-1 rounded-lg font-bold uppercase">${res.hd}</span>
                                </div>
                            </div>
                            <button onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(res.name + ' ' + res.area)}')" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-nat-dark hover:bg-nat-green hover:text-white transition-colors"><i class="fa-solid fa-location-dot text-xs"></i></button>
                        </div>
                    </div>
                </div>`;
            });
        }

        function filterByCreative(type) {
            currentFilter = type;
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(b => b.classList.remove('filter-active'));
            event.target.classList.add('filter-active');

            if(type === 'All') {
                renderRestaurants(allPlaces);
            } else {
                const filtered = allPlaces.filter(p => p.filter === type);
                renderRestaurants(filtered);
            }
        }

        function searchPlaces() {
            const query = document.getElementById('placeSearch').value.toLowerCase();
            const searched = allPlaces.filter(p => 
                (p.name.toLowerCase().includes(query) || p.area.toLowerCase().includes(query)) &&
                (currentFilter === 'All' || p.filter === currentFilter)
            );
            renderRestaurants(searched);
        }

        function openTab(tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let c of contents) { c.style.display = "none"; }
            document.getElementById(tabName).style.display = "block";
            
            const buttons = document.querySelectorAll(".nav-btn");
            buttons.forEach(b => b.classList.remove("active-btn"));
            
            event.currentTarget.classList.add("active-btn");
            window.scrollTo(0,0);
        }

        function addExpense() {
            const date = document.getElementById('expDate').value;
            const cat = document.getElementById('expCat').value;
            const amt = document.getElementById('expAmount').value;
            if(!date || !amt) return alert("กรุณาระบุข้อมูลให้ครบ");
            expenses.push({ date, cat, amt: parseFloat(amt) });
            renderExpenses();
            analyzeExpenses();
            document.getElementById('expAmount').value = "";
        }

        function renderExpenses() {
            const list = document.getElementById('expenseList');
            list.innerHTML = expenses.length ? "" : '<p class="text-center text-[10px] text-gray-400 py-4 font-bold">ยังไม่มีข้อมูล</p>';
            expenses.forEach((e, i) => {
                list.innerHTML += `
                <div class="bg-white p-4 rounded-2xl border border-gray-100 flex justify-between items-center shadow-sm">
                    <div>
                        <p class="text-[10px] font-bold text-nat-green uppercase tracking-widest mb-1">${e.cat} • ${e.date}</p>
                        <p class="font-black text-nat-dark">${e.amt.toLocaleString()} THB</p>
                    </div>
                    <button onclick="expenses.splice(${i}, 1); renderExpenses();" class="text-gray-200 hover:text-red-400"><i class="fa-solid fa-circle-xmark"></i></button>
                </div>`;
            });
        }

        function analyzeExpenses() {
            if(!expenses.length) return;
            document.getElementById('aiInsightBox').classList.remove('hidden');
            const total = expenses.reduce((sum, e) => sum + e.amt, 0);
            document.getElementById('insightText').innerText = `รวมยอดใช้จ่าย ${total.toLocaleString()} THB AI พบว่าคุณใช้จ่ายไปกับประสบการณ์ระดับ "Creative" สูง ซึ่งสอดคล้องกับสไตล์การท่องเที่ยวของคุณในทริปนี้...`;
        }

        function trackFlight() {
            const f = document.getElementById('flightNo').value;
            if(f) window.open(`https://www.google.com/search?q=flight+status+${f}`, '_blank');
        }

        function toggleLogin() { alert("Creative Access Activated"); }
    </script>
