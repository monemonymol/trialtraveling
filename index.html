<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Power Travel Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f4f1; color: #333; }
        .tab-content { display: none; }
        .active { display: block; }
        .nav-btn.active-btn { border-bottom: 2px solid #2d6a4f; color: #2d6a4f; }
        input:focus { outline: none; border-color: #2d6a4f !important; ring: 2px; ring-color: #2d6a4f; }
    </style>
</head>
<body class="max-w-md mx-auto shadow-2xl min-h-screen pb-24 relative rounded-3xl overflow-hidden bg-white">

    <div class="h-64 bg-cover bg-center relative" style="background-image: url('https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0?q=80&w=800&auto=format&fit=crop');">
        <div class="absolute inset-0 bg-black/30 p-6 flex flex-col justify-between text-white">
            <div class="flex justify-between items-center">
                <span class="text-sm font-semibold">📍 Current Location: Japan</span>
                <i class="fa-solid fa-bell text-lg"></i>
            </div>
            <div>
                <h1 class="text-4xl font-bold tracking-tight">Nature Power</h1>
                <p class="text-lg text-white/80">Discover the magic around you</p>
            </div>
        </div>
    </div>

    <nav class="flex justify-around p-4 border-b border-gray-100 sticky top-0 bg-white z-50">
        <button onclick="openTab('budget')" class="nav-btn active-btn pb-2 text-sm font-semibold text-gray-500">
            <i class="fa-solid fa-wallet mr-2"></i>งบประมาณ
        </button>
        <button onclick="openTab('explore')" class="nav-btn pb-2 text-sm font-semibold text-gray-500">
            <i class="fa-solid fa-compass mr-2"></i>สำรวจ
        </button>
        <button onclick="openTab('safe')" class="nav-btn pb-2 text-sm font-semibold text-gray-500">
            <i class="fa-solid fa-life-ring mr-2"></i>ช่วยเหลือ
        </button>
    </nav>

    <main class="p-6">
        
        <div id="budget" class="tab-content active space-y-6">
            <div class="bg-[#f0f4f1] p-6 rounded-2xl">
                <h2 class="text-xl font-semibold mb-4 text-[#1b4332]">Calculate Daily Budget</h2>
                <div class="space-y-4">
                    <input type="number" id="totalBudget" class="w-full p-4 bg-white rounded-xl border-none shadow-sm" placeholder="Total Budget (THB)">
                    <input type="number" id="rate" step="0.01" class="w-full p-4 bg-white rounded-xl border-none shadow-sm" placeholder="Exchange Rate (e.g., 0.23)">
                    <input type="number" id="days" class="w-full p-4 bg-white rounded-xl border-none shadow-sm" placeholder="Duration (Days)">
                    <button onclick="calcBudget()" class="w-full bg-[#2d6a4f] text-white font-semibold py-4 rounded-xl shadow-md transition hover:bg-[#1b4332]">คำนวณเงิน</button>
                </div>
                <div id="result" class="mt-6 text-center hidden p-6 bg-white rounded-2xl shadow-inner">
                    <h3 id="dailyAmount" class="text-3xl font-bold text-[#1b4332]"></h3>
                    <p id="currencyResult" class="text-sm text-gray-600 mt-1"></p>
                </div>
            </div>
        </div>

        <div id="explore" class="tab-content space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-semibold mb-3">✈️ Check Flight Status</h2>
                <input type="text" id="flightNo" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 mb-3" placeholder="Flight No. (e.g., JL708)">
                <button onclick="trackFlight()" class="w-full bg-gray-100 text-gray-700 font-semibold py-3 rounded-xl">Track Flight</button>
            </div>

            <div class="rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                <img src="https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?q=80&w=400" alt="Attractions" class="h-40 w-full object-cover">
                <div class="p-4">
                    <h3 class="font-semibold text-lg">Local Attractions</h3>
                    <p class="text-sm text-gray-600 mb-3">Find nearby spots, parks, and more.</p>
                    <button onclick="findNearby('attractions')" class="w-full bg-[#2d6a4f] text-white font-semibold py-3 rounded-xl">ที่เที่ยวใกล้ฉัน</button>
                </div>
            </div>

            <div class="rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=400" alt="Dining" class="h-40 w-full object-cover">
                <div class="p-4">
                    <h3 class="font-semibold text-lg">Restaurants & Cafes</h3>
                    <p class="text-sm text-gray-600 mb-3">Discover the best local food.</p>
                    <button onclick="findNearby('restaurants')" class="w-full bg-[#2d6a4f] text-white font-semibold py-3 rounded-xl">ร้านอาหารใกล้ฉัน</button>
                </div>
            </div>
        </div>

        <div id="safe" class="tab-content space-y-4">
            <h2 class="text-xl font-semibold mb-4">Emergency Support</h2>
            <div class="bg-white p-5 rounded-xl border-l-4 border-red-500 shadow-sm flex items-center gap-4">
                <i class="fa-solid fa-hospital text-3xl text-red-500"></i>
                <div>
                    <p class="font-semibold text-red-500 text-sm">Need Help (Japanese)</p>
                    <p class="text-gray-900 text-lg font-medium">たすけてください</p>
                </div>
            </div>
            <a href="tel:110" class="block w-full bg-red-500 text-white text-center font-semibold py-4 rounded-xl shadow-lg transition hover:bg-red-600">
                📞 Call Police (110)
            </a>
        </div>

    </main>

    <script>
        function openTab(tabName) {
            // Swith tab content
            const contents = document.getElementsByClassName("tab-content");
            for (let c of contents) { c.style.display = "none"; }
            document.getElementById(tabName).style.display = "block";

            // Switch active nav button state
            const buttons = document.getElementsByClassName("nav-btn");
            for (let b of buttons) { b.classList.remove("active-btn"); }
            event.currentTarget.classList.add("active-btn");
        }

        // --- Core Functions (kept from previous code) ---
        function calcBudget() {
            const total = document.getElementById('totalBudget').value;
            const rate = document.getElementById('rate').value;
            const days = document.getElementById('days').value;
            if(total && rate && days) {
                const dailyTHB = (total / days).toFixed(0);
                const dailyForeign = (dailyTHB / rate).toFixed(0);
                document.getElementById('dailyAmount').innerText = parseInt(dailyTHB).toLocaleString() + " THB";
                document.getElementById('currencyResult').innerText = "Approx. " + parseInt(dailyForeign).toLocaleString() + " Local Currency";
                document.getElementById('result').classList.remove('hidden');
            }
        }

        function trackFlight() {
            const flight = document.getElementById('flightNo').value;
            if(flight) {
                window.open(`https://www.google.com/search?q=flight+status+${flight}`, '_blank');
            } else { alert("Please enter a flight number."); }
        }

        function findNearby(type) {
            const query = type === 'attractions' ? 'tourist+attractions' : 'restaurants+and+cafes';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    window.open(`https://www.google.com/maps/search/${query}/@${lat},${lon},15z`, '_blank');
                }, () => { window.open(`https://www.google.com/maps/search/${query}/`, '_blank'); });
            } else { window.open(`https://www.google.com/maps/search/${query}/`, '_blank'); }
        }
    </script>
</body>
</html>
